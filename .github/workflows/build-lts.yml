name: "Build LTS"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"
  push:
    branches:
      - 'main'
    paths:
      - "build-lts.sh"
      - ".github/workflows/build-lts.yml"
      - "wslconf/*"

permissions:
  contents: write  

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    outputs:
      RELEASE: ${{ steps.start_build.outputs.RELEASE }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: start_build
        run: |
          bash build-lts.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: amd64
          archive: false
          path: |
             ubuntu-lts-amd64.wsl

  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: start_build
        run: |
          bash build-lts.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: arm64
          archive: false
          path: |
             ubuntu-lts-arm64.wsl
    
  release-lts:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8

      - name: Release LTS
        uses: softprops/action-gh-release@v3
        with:
          tag_name: lts
          name: Release LTS
          files: |
            ubuntu-lts-amd64.wsl
            ubuntu-lts-arm64.wsl
          preserve_order: true
          make_latest: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}